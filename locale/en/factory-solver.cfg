# ---- Editor next-step guide (state-aware hints) --------------------------
# Shown in the center editor: a single line nudging the next workflow action for
# the selected solution's current state. It retires once the solution has two or
# more production lines. Steps that have their own dialog are explained in that
# dialog instead (see "Dialog descriptions" below).
# No solution selected yet. The blue "+" is in the left toolbar; keep it literal.
factory-solver-guide-create-solution=Click the blue + button to create a new solution.
# Solution exists but has no constraints yet. A constraint anchors an item you
# want to produce OR consume: the starting point the factory is built from.
# "Add constraint" must match the button caption (factory-solver-add-constraint).
factory-solver-guide-add-constraint=Click "Add constraint" to choose the item you want to produce or consume - the starting point for the rest of the factory.
# Has a constraint but no production line yet. Clicking a constraint's icon adds
# a line (recipe constraint) or opens the recipe picker (item / fluid).
factory-solver-guide-add-line=Click a constraint's icon to add a production line for it.
# Exactly one production line: encourage extending the recipe chain. Keep
# "Product" / "Ingredient" matching the editor column headers.
factory-solver-guide-more-lines=Click a Product or Ingredient icon to add another line and build out the recipe chain.

