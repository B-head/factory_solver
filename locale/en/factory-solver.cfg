# Interop warnings below are shown after importing/exporting a Factory Planner
# or Helmod string. Each reports one thing that could not be represented and was
# dropped or changed. The "Factory Planner import:" / "Helmod export:" lead-in is
# a fixed label; keep that orientation. __1__ is usually a recipe name (but see
# the per-key notes — some pass an item/fluid name or an integer count); phrases
# like "__1__ line(s)" / "__1__ recipe(s)" are integer counts.
factory-solver-fp-import-warning-duplicate-recipe=Factory Planner import: recipe "__1__" appeared more than once; only the first occurrence was kept.
factory-solver-fp-import-warning-flattened-subfloors=Factory Planner import: subfloor hierarchy flattened into a single production line list.
# __1__ = integer count of lines.
factory-solver-fp-import-warning-percentage=Factory Planner import: dropped non-100% line percentage on __1__ line(s); each line is solved at its natural rate instead.
factory-solver-fp-import-warning-inactive-line=Factory Planner import: imported __1__ inactive line(s) as active; factory_solver has no per-line enable toggle.
factory-solver-fp-import-warning-priority-product=Factory Planner import: dropped priority-product selection on __1__ line(s); factory_solver lets the LP balance multi-product recipes instead.
factory-solver-fp-export-warning-recipe-lower-bound=Factory Planner export: recipe "__1__" lower-bound constraint cannot be expressed and was dropped.
# __1__ = an item/fluid name here (not a recipe).
factory-solver-fp-export-warning-upper-bound-product=Factory Planner export: upper / equal bound on "__1__" exported as a Factory Planner produce-at-least target; bound direction was lost.
# __1__ = an item/fluid name here (not a recipe).
factory-solver-fp-export-warning-constraint-temperature=Factory Planner export: dropped temperature constraint on "__1__"; Factory Planner has no fluid temperature dimension.
# __1__ = constraint target kind, __2__ = its name. Only kinds with no mapping in
# the target format reach here (machine / virtual_material / transfer); item /
# fluid / recipe / virtual recipes are handled earlier.
factory-solver-fp-export-warning-unsupported-constraint=Factory Planner export: constraint on __1__ "__2__" has no Factory Planner equivalent and was dropped.
factory-solver-fp-export-warning-multiple-beacons=Factory Planner export: line for recipe "__1__" has multiple beacons; only the first was exported.
factory-solver-fp-export-warning-virtual-recipe=Factory Planner export: virtual recipe "__1__" has no Factory Planner equivalent and was dropped.
factory-solver-helmod-import-warning-flattened-blocks=Helmod import: block hierarchy flattened into a single production line list.
factory-solver-helmod-import-warning-duplicate-recipe=Helmod import: recipe "__1__" appeared more than once (typically because the same recipe lives in multiple blocks); only the first occurrence was kept.
# __1__ = recipe name, __2__ = the production multiplier value that was reset.
factory-solver-helmod-import-warning-recipe-production=Helmod import: recipe "__1__" had production multiplier __2__ (not 1); reset to 1.
factory-solver-helmod-import-warning-unsupported-constraints=Helmod import: dropped Helmod-specific constraints on __1__ recipe(s).
factory-solver-helmod-import-warning-module-priority=Helmod import: dropped module priority on __1__ recipe(s); only the module list itself was kept.
factory-solver-helmod-import-warning-beacon-extras=Helmod import: dropped beacon per_factory / per_factory_constant on __1__ recipe(s); only the combo count was kept.
factory-solver-helmod-import-warning-virtual-recipe-unmappable=Helmod import: virtual recipe "__1__" has no factory_solver counterpart and was dropped.
factory-solver-helmod-import-warning-virtual-recipe-burnt=Helmod import: burnt recipe "__1__" was dropped (factory_solver tracks burnt results via the fuel channel of the base recipe).
factory-solver-helmod-import-warning-virtual-recipe-technology=Helmod import: research recipe "__1__" was dropped (technology and research-pack semantics do not align).
factory-solver-helmod-import-warning-virtual-recipe-customized=Helmod import: user-customized recipe "__1__" was dropped (factory_solver has no equivalent editable-recipe mechanism).
factory-solver-helmod-import-warning-energy-pseudo-item=Helmod import: dropped constraint on Helmod energy pseudo-item "__1__" (factory_solver's LP has no electricity channel).
factory-solver-helmod-export-warning-virtual-recipe=Helmod export: virtual recipe "__1__" has no Helmod equivalent and was dropped.
factory-solver-helmod-export-warning-virtual-recipe-research=Helmod export: research virtual recipe "__1__" was dropped (Helmod's technology recipes produce a technology pseudo-item, not pack flow).
factory-solver-helmod-export-warning-self-test-loadstring=Helmod export: the serialised model is not valid Lua source (factory_solver bug). Please report what production lines you exported. Helmod will fail to load this string with an internal Converter.lua error.
factory-solver-helmod-export-warning-self-test-roundtrip=Helmod export: the encoded string does not survive an encode/decode round-trip (likely a Factorio runtime issue). Helmod will fail to load this string with an internal Converter.lua error.
# __1__ = total production-line count (an integer, not a recipe name).
factory-solver-helmod-export-warning-no-recipes-emitted=Helmod export: __1__ production line(s) in the solution but none were emitted to the Helmod model. All lines were dropped due to unsupported virtual recipes or missing machine assignment.
# __1__ = dropped count, __2__ = total count.
factory-solver-helmod-export-warning-partial-drop=Helmod export: __1__ of __2__ production line(s) were dropped. See preceding warnings for the specific recipes.
factory-solver-helmod-export-warning-no-machine=Helmod export: dropped production line for "__1__" because the line has no machine_typed_name assigned.
factory-solver-helmod-export-warning-recipe-equal-bound=Helmod export: recipe "__1__" equal-bound constraint was written as an upper bound (Helmod has no force-limit).
factory-solver-helmod-export-warning-recipe-lower-bound=Helmod export: recipe "__1__" lower-bound constraint cannot be expressed and was dropped.
factory-solver-helmod-export-warning-upper-bound-product=Helmod export: upper/equal-bound constraint on "__1__" was written as a lower bound (Helmod product/ingredient inputs are lower-bound only). The numeric value is preserved; retune in Helmod if the original direction mattered.
factory-solver-helmod-export-warning-constraint-temperature=Helmod export: dropped temperature on constraint for "__1__" (Helmod has no temperature field on products).
factory-solver-helmod-export-warning-multiple-solutions=Helmod export: shared strings hold only one model; only the first selected solution was exported.
factory-solver-helmod-export-warning-substrate=Helmod export: dropped substrate tile on plant recipe "__1__" (Helmod has no plant substrate concept).
# __1__ = constraint target kind, __2__ = its name. Only kinds with no mapping in
# the target format reach here (machine / virtual_material / transfer); item /
# fluid / recipe / virtual recipes are handled earlier.
factory-solver-helmod-export-warning-unsupported-constraint=Helmod export: constraint on __1__ "__2__" has no Helmod equivalent and was dropped.

