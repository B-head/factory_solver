# factory_solver — English source strings.
#
# Lines starting with '#' are comments for translators and are ignored by the
# game engine. Each one documents the string directly BELOW it. Keep comments on
# their own line above the key: a comment placed after the value (key=value # x)
# would be swallowed into the translated string.
#
# Global rules for every string in this file:
#   - __1__, __2__, … are values substituted at runtime (placeholders). Keep
#     every one that appears; you may reorder them to fit the target grammar.
#   - This file uses no %-escaping; write a literal percent as a single "%".
#   - Do not translate product names: factory_solver, Factory Planner, Helmod,
#     README. Keep the acronyms IPM and LP as-is.
#   - For Factorio domain terms (Recipe, Ingredient, Product, Module, Beacon,
#     Quality, Machine, Fuel), reuse the wording the base game uses in the
#     target language.

# Mod / main window title.
factory_solver_title=Factory solver

# ---- Fluid temperature formatting ----------------------------------------
# Amount label for a material carrying a single temperature (e.g. steam 165°C).
# __1__ = material name, __2__ = temperature in degrees Celsius.
factory-solver-fluid-temperature-single=__1__ at __2__°C
# Same, for an accepted temperature range.
# __1__ = material name, __2__ = lower bound °C, __3__ = upper bound °C.
factory-solver-fluid-temperature-range=__1__ at __2__°C – __3__°C
# Compact temperature shown inside a slot button. __1__ = temperature; the
# trailing ° is the degree sign.
factory-solver-slot-temperature=__1__°
# Top line of a two-line in-slot temperature RANGE: the lower bound. The upper
# bound is shown on the line below (via -slot-temperature); the ~ signals the
# range continues. __1__ = temperature.
factory-solver-slot-temperature-lower=__1__°~

