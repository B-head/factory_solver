# ---- Operation hint tooltips ---------------------------------------------
# The lines below are appended under an icon's name in its tooltip, one mouse
# action per line, so the player can see what each click does without leaving
# the UI. Code joins the relevant fragments with newlines per button.
#
# Every value follows the template:  [font=default-bold]<modifier>:[/font] <action>
# Translate only the visible words: the <modifier> label (e.g. "Left-click",
# "Shift + Right-click") and the <action> phrase after it. Reuse the base game's
# own wording for the mouse buttons and for Shift / Control in the target
# language. These are literal mouse/keyboard actions, not rebindable controls,
# so they are spelled out, not written as __CONTROL__ placeholders.
#
# Leave the markup itself verbatim: [font=default-bold] and [/font] are Factorio
# rich-text tags that bold the modifier label, and "default-bold" is a font name
# — do NOT translate or change it. Keep the ":" inside the bold wrap and the
# space before <action>, matching the template above.

