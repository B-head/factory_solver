factory-solver-fp-import-warning-duplicate-recipe=Factory Planner-Import: Bauplan „__1__“ kam mehrfach vor; nur das erste Vorkommen wurde behalten.
factory-solver-fp-import-warning-flattened-subfloors=Factory Planner-Import: Unterebenen-Hierarchie in eine einzige Produktionslinienliste eingeebnet.
factory-solver-fp-import-warning-percentage=Factory Planner-Import: Nicht-100%-Linienprozentsatz auf __1__ Linie(n) verworfen; jede Linie wird stattdessen mit ihrer natürlichen Rate gelöst.
factory-solver-fp-import-warning-inactive-line=Factory Planner-Import: __1__ inaktive Linie(n) als aktiv importiert; Factory solver hat keinen Schalter zum Aktivieren pro Linie.
factory-solver-fp-import-warning-priority-product=Factory Planner-Import: Prioritätsprodukt-Auswahl auf __1__ Linie(n) verworfen; Factory solver lässt stattdessen das LP Mehrproduktbaupläne ausbalancieren.
factory-solver-fp-export-warning-recipe-lower-bound=Factory Planner-Export: Untergrenzen-Beschränkung für Bauplan „__1__“ kann nicht ausgedrückt werden und wurde verworfen.
factory-solver-fp-export-warning-upper-bound-product=Factory Planner-Export: Ober-/Gleich-Grenze für „__1__“ als Factory Planner-Ziel „mindestens produzieren“ exportiert; die Grenzrichtung ging verloren.
factory-solver-fp-export-warning-constraint-temperature=Factory Planner-Export: Temperaturbeschränkung für „__1__“ verworfen; Factory Planner hat keine Dimension für Flüssigkeitstemperatur.
factory-solver-fp-export-warning-unsupported-constraint=Factory Planner-Export: Beschränkung für __1__ „__2__“ hat keine Entsprechung in Factory Planner und wurde verworfen.
factory-solver-fp-export-warning-multiple-beacons=Factory Planner-Export: Linie für Bauplan „__1__“ hat mehrere Effektverteiler; nur der erste wurde exportiert.
factory-solver-fp-export-warning-virtual-recipe=Factory Planner-Export: virtueller Bauplan „__1__“ hat keine Entsprechung in Factory Planner und wurde verworfen.
factory-solver-helmod-import-warning-flattened-blocks=Helmod-Import: Block-Hierarchie in eine einzige Produktionslinienliste eingeebnet.
factory-solver-helmod-import-warning-duplicate-recipe=Helmod-Import: Bauplan „__1__“ kam mehrfach vor (typischerweise, weil derselbe Bauplan in mehreren Blöcken liegt); nur das erste Vorkommen wurde behalten.
factory-solver-helmod-import-warning-recipe-production=Helmod-Import: Bauplan „__1__“ hatte Produktionsmultiplikator __2__ (nicht 1); auf 1 zurückgesetzt.
factory-solver-helmod-import-warning-unsupported-constraints=Helmod-Import: Helmod-spezifische Beschränkungen auf __1__ Bauplan/-pläne(n) verworfen.
factory-solver-helmod-import-warning-module-priority=Helmod-Import: Modulpriorität auf __1__ Bauplan/-pläne(n) verworfen; nur die Modulliste selbst wurde behalten.
factory-solver-helmod-import-warning-beacon-extras=Helmod-Import: Effektverteiler per_factory / per_factory_constant auf __1__ Bauplan/-pläne(n) verworfen; nur die Kombinationsanzahl wurde behalten.
factory-solver-helmod-import-warning-virtual-recipe-unmappable=Helmod-Import: virtueller Bauplan „__1__“ hat keine Entsprechung in Factory solver und wurde verworfen.
factory-solver-helmod-import-warning-virtual-recipe-burnt=Helmod-Import: Verbrennungsbauplan „__1__“ wurde verworfen (Factory solver verfolgt Verbrennungsergebnisse über den Brennstoffkanal des Basisbauplans).
factory-solver-helmod-import-warning-virtual-recipe-technology=Helmod-Import: Forschungsbauplan „__1__“ wurde verworfen (Technologie- und Forschungspaket-Semantik stimmen nicht überein).
factory-solver-helmod-import-warning-virtual-recipe-customized=Helmod-Import: benutzerangepasster Bauplan „__1__“ wurde verworfen (Factory solver hat keinen entsprechenden Mechanismus für bearbeitbare Baupläne).
factory-solver-helmod-import-warning-energy-pseudo-item=Helmod-Import: Beschränkung für Helmod-Energie-Pseudo-Gegenstand „__1__“ verworfen (das LP von Factory solver hat keinen Stromkanal).
factory-solver-helmod-export-warning-virtual-recipe=Helmod-Export: virtueller Bauplan „__1__“ hat keine Entsprechung in Helmod und wurde verworfen.
factory-solver-helmod-export-warning-virtual-recipe-research=Helmod-Export: virtueller Forschungsbauplan „__1__“ wurde verworfen (Helmods Technologiebaupläne erzeugen einen Technologie-Pseudo-Gegenstand, keinen Paketfluss).
factory-solver-helmod-export-warning-self-test-loadstring=Helmod-Export: Das serialisierte Modell ist kein gültiger Lua-Quelltext (Factory solver-Fehler). Bitte melde, welche Produktionslinien du exportiert hast. Helmod kann diese Zeichenfolge mit einem internen Converter.lua-Fehler nicht laden.
factory-solver-helmod-export-warning-self-test-roundtrip=Helmod-Export: Die kodierte Zeichenfolge übersteht keinen Kodier-/Dekodier-Umlauf (wahrscheinlich ein Factorio-Laufzeitproblem). Helmod kann diese Zeichenfolge mit einem internen Converter.lua-Fehler nicht laden.
factory-solver-helmod-export-warning-no-recipes-emitted=Helmod-Export: __1__ Produktionslinie(n) in der Lösung, aber keine wurde in das Helmod-Modell ausgegeben. Alle Linien wurden wegen nicht unterstützter virtueller Baupläne oder fehlender Maschinenzuweisung verworfen.
factory-solver-helmod-export-warning-partial-drop=Helmod-Export: __1__ von __2__ Produktionslinie(n) wurden verworfen. Siehe die vorherigen Warnungen für die konkreten Baupläne.
factory-solver-helmod-export-warning-no-machine=Helmod-Export: Produktionslinie für „__1__“ verworfen, weil der Linie kein machine_typed_name zugewiesen ist.
factory-solver-helmod-export-warning-recipe-equal-bound=Helmod-Export: Gleich-Grenzen-Beschränkung für Bauplan „__1__“ wurde als Obergrenze geschrieben (Helmod hat keine Zwangsbegrenzung).
factory-solver-helmod-export-warning-recipe-lower-bound=Helmod-Export: Untergrenzen-Beschränkung für Bauplan „__1__“ kann nicht ausgedrückt werden und wurde verworfen.
factory-solver-helmod-export-warning-upper-bound-product=Helmod-Export: Ober-/Gleich-Grenzen-Beschränkung für „__1__“ wurde als Untergrenze geschrieben (Helmod-Produkt-/Komponenten-Eingaben sind nur untergrenzig). Der Zahlenwert bleibt erhalten; passe ihn in Helmod neu an, falls die ursprüngliche Richtung wichtig war.
factory-solver-helmod-export-warning-constraint-temperature=Helmod-Export: Temperatur in der Beschränkung für „__1__“ verworfen (Helmod hat kein Temperaturfeld bei Produkten).
factory-solver-helmod-export-warning-multiple-solutions=Helmod-Export: Geteilte Zeichenfolgen enthalten nur ein Modell; nur die erste ausgewählte Lösung wurde exportiert.
factory-solver-helmod-export-warning-substrate=Helmod-Export: Untergrund-Kachel beim Pflanzenbauplan „__1__“ verworfen (Helmod hat kein Konzept für Pflanzen-Untergrund).
factory-solver-helmod-export-warning-unsupported-constraint=Helmod-Export: Beschränkung für __1__ „__2__“ hat keine Entsprechung in Helmod und wurde verworfen.

