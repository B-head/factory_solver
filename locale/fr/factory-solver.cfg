factory-solver-fp-import-warning-duplicate-recipe=Importation Factory Planner : la recette « __1__ » est apparue plusieurs fois ; seule la première occurrence a été conservée.
factory-solver-fp-import-warning-flattened-subfloors=Importation Factory Planner : la hiérarchie des sous-niveaux a été aplatie en une seule liste de chaînes de production.
factory-solver-fp-import-warning-percentage=Importation Factory Planner : pourcentage de chaîne différent de 100 % abandonné sur __1__ chaîne(s) ; chaque chaîne est résolue à son débit naturel à la place.
factory-solver-fp-import-warning-inactive-line=Importation Factory Planner : __1__ chaîne(s) inactive(s) importée(s) comme actives ; Factory solver n'a pas de bascule d'activation par chaîne.
factory-solver-fp-import-warning-priority-product=Importation Factory Planner : sélection du produit prioritaire abandonnée sur __1__ chaîne(s) ; Factory solver laisse le LP équilibrer les recettes à produits multiples à la place.
factory-solver-fp-export-warning-recipe-lower-bound=Exportation Factory Planner : la contrainte de limite inférieure de la recette « __1__ » ne peut pas être exprimée et a été abandonnée.
factory-solver-fp-export-warning-upper-bound-product=Exportation Factory Planner : la limite supérieure / exacte sur « __1__ » a été exportée comme objectif Factory Planner « produire au moins » ; le sens de la limite a été perdu.
factory-solver-fp-export-warning-constraint-temperature=Exportation Factory Planner : contrainte de température abandonnée sur « __1__ » ; Factory Planner n'a pas de dimension de température de fluide.
factory-solver-fp-export-warning-unsupported-constraint=Exportation Factory Planner : la contrainte sur __1__ « __2__ » n'a pas d'équivalent Factory Planner et a été abandonnée.
factory-solver-fp-export-warning-multiple-beacons=Exportation Factory Planner : la chaîne pour la recette « __1__ » comporte plusieurs diffuseurs de modules ; seul le premier a été exporté.
factory-solver-fp-export-warning-virtual-recipe=Exportation Factory Planner : la recette virtuelle « __1__ » n'a pas d'équivalent Factory Planner et a été abandonnée.
factory-solver-helmod-import-warning-flattened-blocks=Importation Helmod : la hiérarchie des blocs a été aplatie en une seule liste de chaînes de production.
factory-solver-helmod-import-warning-duplicate-recipe=Importation Helmod : la recette « __1__ » est apparue plusieurs fois (généralement parce que la même recette se trouve dans plusieurs blocs) ; seule la première occurrence a été conservée.
factory-solver-helmod-import-warning-recipe-production=Importation Helmod : la recette « __1__ » avait un multiplicateur de production __2__ (différent de 1) ; réinitialisé à 1.
factory-solver-helmod-import-warning-unsupported-constraints=Importation Helmod : contraintes spécifiques à Helmod abandonnées sur __1__ recette(s).
factory-solver-helmod-import-warning-module-priority=Importation Helmod : priorité des modules abandonnée sur __1__ recette(s) ; seule la liste des modules elle-même a été conservée.
factory-solver-helmod-import-warning-beacon-extras=Importation Helmod : per_factory / per_factory_constant des diffuseurs de modules abandonné sur __1__ recette(s) ; seul le nombre de combinaisons a été conservé.
factory-solver-helmod-import-warning-virtual-recipe-unmappable=Importation Helmod : la recette virtuelle « __1__ » n'a pas d'équivalent Factory solver et a été abandonnée.
factory-solver-helmod-import-warning-virtual-recipe-burnt=Importation Helmod : la recette de combustion « __1__ » a été abandonnée (Factory solver suit les résidus de combustion via le canal de carburant de la recette de base).
factory-solver-helmod-import-warning-virtual-recipe-technology=Importation Helmod : la recette de recherche « __1__ » a été abandonnée (les sémantiques des technologies et des paquets de science ne concordent pas).
factory-solver-helmod-import-warning-virtual-recipe-customized=Importation Helmod : la recette personnalisée par l'utilisateur « __1__ » a été abandonnée (Factory solver n'a pas de mécanisme équivalent de recette modifiable).
factory-solver-helmod-import-warning-energy-pseudo-item=Importation Helmod : contrainte abandonnée sur le pseudo-objet d'énergie Helmod « __1__ » (le LP de Factory solver n'a pas de canal d'électricité).
factory-solver-helmod-export-warning-virtual-recipe=Exportation Helmod : la recette virtuelle « __1__ » n'a pas d'équivalent Helmod et a été abandonnée.
factory-solver-helmod-export-warning-virtual-recipe-research=Exportation Helmod : la recette virtuelle de recherche « __1__ » a été abandonnée (les recettes de technologie de Helmod produisent un pseudo-objet de technologie, pas un flux de paquets).
factory-solver-helmod-export-warning-self-test-loadstring=Exportation Helmod : le modèle sérialisé n'est pas une source Lua valide (bug de Factory solver). Veuillez signaler quelles chaînes de production vous avez exportées. Helmod ne parviendra pas à charger cette chaîne avec une erreur interne Converter.lua.
factory-solver-helmod-export-warning-self-test-roundtrip=Exportation Helmod : la chaîne encodée ne survit pas à un aller-retour encodage/décodage (probablement un problème d'exécution de Factorio). Helmod ne parviendra pas à charger cette chaîne avec une erreur interne Converter.lua.
factory-solver-helmod-export-warning-no-recipes-emitted=Exportation Helmod : __1__ chaîne(s) de production dans la solution mais aucune n'a été émise vers le modèle Helmod. Toutes les chaînes ont été abandonnées en raison de recettes virtuelles non prises en charge ou d'une absence d'affectation de machine.
factory-solver-helmod-export-warning-partial-drop=Exportation Helmod : __1__ chaîne(s) de production sur __2__ ont été abandonnées. Voir les avertissements précédents pour les recettes concernées.
factory-solver-helmod-export-warning-no-machine=Exportation Helmod : chaîne de production abandonnée pour « __1__ » car aucune machine_typed_name ne lui est affectée.
factory-solver-helmod-export-warning-recipe-equal-bound=Exportation Helmod : la contrainte exacte de la recette « __1__ » a été écrite comme une limite supérieure (Helmod n'a pas de limite stricte).
factory-solver-helmod-export-warning-recipe-lower-bound=Exportation Helmod : la contrainte de limite inférieure de la recette « __1__ » ne peut pas être exprimée et a été abandonnée.
factory-solver-helmod-export-warning-upper-bound-product=Exportation Helmod : la contrainte de limite supérieure/exacte sur « __1__ » a été écrite comme une limite inférieure (les entrées produit/ingrédient de Helmod sont uniquement à limite inférieure). La valeur numérique est préservée ; réajustez dans Helmod si le sens d'origine importait.
factory-solver-helmod-export-warning-constraint-temperature=Exportation Helmod : température abandonnée sur la contrainte pour « __1__ » (Helmod n'a pas de champ de température sur les produits).
factory-solver-helmod-export-warning-multiple-solutions=Exportation Helmod : les chaînes partagées ne contiennent qu'un seul modèle ; seule la première solution sélectionnée a été exportée.
factory-solver-helmod-export-warning-substrate=Exportation Helmod : tuile de substrat abandonnée sur la recette de plante « __1__ » (Helmod n'a pas de concept de substrat de plante).
factory-solver-helmod-export-warning-unsupported-constraint=Exportation Helmod : la contrainte sur __1__ « __2__ » n'a pas d'équivalent Helmod et a été abandonnée.

