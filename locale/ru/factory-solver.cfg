factory-solver-fp-import-warning-duplicate-recipe=Импорт Factory Planner: рецепт «__1__» встретился более одного раза; сохранено только первое вхождение.
factory-solver-fp-import-warning-flattened-subfloors=Импорт Factory Planner: иерархия подуровней сведена в единый список производственных линий.
factory-solver-fp-import-warning-percentage=Импорт Factory Planner: отброшен процент линии, отличный от 100%, на __1__ линиях; вместо этого каждая линия решается на своей естественной скорости.
factory-solver-fp-import-warning-inactive-line=Импорт Factory Planner: импортировано __1__ неактивных линий как активные; в Factory solver нет переключателя включения отдельных линий.
factory-solver-fp-import-warning-priority-product=Импорт Factory Planner: отброшен выбор приоритетной продукции на __1__ линиях; вместо этого Factory solver позволяет LP балансировать многопродуктовые рецепты.
factory-solver-fp-export-warning-recipe-lower-bound=Экспорт Factory Planner: ограничение нижней границы рецепта «__1__» невозможно выразить, и оно было отброшено.
factory-solver-fp-export-warning-upper-bound-product=Экспорт Factory Planner: верхняя / точная граница для «__1__» экспортирована как цель «производить не менее» в Factory Planner; направление границы было потеряно.
factory-solver-fp-export-warning-constraint-temperature=Экспорт Factory Planner: отброшено температурное ограничение для «__1__»; в Factory Planner нет измерения температуры жидкости.
factory-solver-fp-export-warning-unsupported-constraint=Экспорт Factory Planner: ограничение на __1__ «__2__» не имеет эквивалента в Factory Planner и было отброшено.
factory-solver-fp-export-warning-multiple-beacons=Экспорт Factory Planner: линия рецепта «__1__» имеет несколько маяков; экспортирован только первый.
factory-solver-fp-export-warning-virtual-recipe=Экспорт Factory Planner: виртуальный рецепт «__1__» не имеет эквивалента в Factory Planner и был отброшен.
factory-solver-helmod-import-warning-flattened-blocks=Импорт Helmod: иерархия блоков сведена в единый список производственных линий.
factory-solver-helmod-import-warning-duplicate-recipe=Импорт Helmod: рецепт «__1__» встретился более одного раза (обычно потому, что один и тот же рецепт находится в нескольких блоках); сохранено только первое вхождение.
factory-solver-helmod-import-warning-recipe-production=Импорт Helmod: рецепт «__1__» имел множитель производства __2__ (не 1); сброшен на 1.
factory-solver-helmod-import-warning-unsupported-constraints=Импорт Helmod: отброшены специфичные для Helmod ограничения на __1__ рецептах.
factory-solver-helmod-import-warning-module-priority=Импорт Helmod: отброшен приоритет модулей на __1__ рецептах; сохранён только сам список модулей.
factory-solver-helmod-import-warning-beacon-extras=Импорт Helmod: отброшены параметры маяка per_factory / per_factory_constant на __1__ рецептах; сохранено только количество комбинаций.
factory-solver-helmod-import-warning-virtual-recipe-unmappable=Импорт Helmod: виртуальный рецепт «__1__» не имеет аналога в Factory solver и был отброшен.
factory-solver-helmod-import-warning-virtual-recipe-burnt=Импорт Helmod: рецепт сжигания «__1__» был отброшен (Factory solver отслеживает результаты сжигания через топливный канал базового рецепта).
factory-solver-helmod-import-warning-virtual-recipe-technology=Импорт Helmod: рецепт исследования «__1__» был отброшен (семантика технологий и наборов исследований не совпадает).
factory-solver-helmod-import-warning-virtual-recipe-customized=Импорт Helmod: настроенный пользователем рецепт «__1__» был отброшен (в Factory solver нет аналогичного механизма редактируемых рецептов).
factory-solver-helmod-import-warning-energy-pseudo-item=Импорт Helmod: отброшено ограничение на псевдопредмет энергии Helmod «__1__» (в LP Factory solver нет канала электричества).
factory-solver-helmod-export-warning-virtual-recipe=Экспорт Helmod: виртуальный рецепт «__1__» не имеет эквивалента в Helmod и был отброшен.
factory-solver-helmod-export-warning-virtual-recipe-research=Экспорт Helmod: исследовательский виртуальный рецепт «__1__» был отброшен (технологические рецепты Helmod производят псевдопредмет технологии, а не поток наборов).
factory-solver-helmod-export-warning-self-test-loadstring=Экспорт Helmod: сериализованная модель не является корректным исходным кодом Lua (ошибка Factory solver). Пожалуйста, сообщите, какие производственные линии вы экспортировали. Helmod не сможет загрузить эту строку из-за внутренней ошибки Converter.lua.
factory-solver-helmod-export-warning-self-test-roundtrip=Экспорт Helmod: закодированная строка не выдерживает цикла кодирования/декодирования (вероятно, проблема среды выполнения Factorio). Helmod не сможет загрузить эту строку из-за внутренней ошибки Converter.lua.
factory-solver-helmod-export-warning-no-recipes-emitted=Экспорт Helmod: в решении __1__ производственных линий, но ни одна не была выведена в модель Helmod. Все линии были отброшены из-за неподдерживаемых виртуальных рецептов или отсутствия назначенной машины.
factory-solver-helmod-export-warning-partial-drop=Экспорт Helmod: отброшено __1__ из __2__ производственных линий. См. предыдущие предупреждения для конкретных рецептов.
factory-solver-helmod-export-warning-no-machine=Экспорт Helmod: отброшена производственная линия для «__1__», поскольку линии не назначен machine_typed_name.
factory-solver-helmod-export-warning-recipe-equal-bound=Экспорт Helmod: ограничение точной границы рецепта «__1__» было записано как верхняя граница (в Helmod нет жёсткого ограничения).
factory-solver-helmod-export-warning-recipe-lower-bound=Экспорт Helmod: ограничение нижней границы рецепта «__1__» невозможно выразить, и оно было отброшено.
factory-solver-helmod-export-warning-upper-bound-product=Экспорт Helmod: ограничение верхней/точной границы для «__1__» было записано как нижняя граница (входы продукции/ингредиентов Helmod допускают только нижнюю границу). Числовое значение сохранено; перенастройте в Helmod, если исходное направление было важным.
factory-solver-helmod-export-warning-constraint-temperature=Экспорт Helmod: отброшена температура в ограничении для «__1__» (в Helmod нет поля температуры у продукции).
factory-solver-helmod-export-warning-multiple-solutions=Экспорт Helmod: общие строки содержат только одну модель; экспортировано только первое выбранное решение.
factory-solver-helmod-export-warning-substrate=Экспорт Helmod: отброшена поверхность для рецепта растения «__1__» (в Helmod нет понятия поверхности для растений).
factory-solver-helmod-export-warning-unsupported-constraint=Экспорт Helmod: ограничение на __1__ «__2__» не имеет эквивалента в Helmod и было отброшено.

