factory-solver-desc-quality-variants=Выберите уровни качества, на которых производить этот рецепт. Каждый отмеченный уровень качества становится отдельной производственной линией.
factory-solver-desc-research-bonuses=Задайте бонусы исследований для всей силы. Отметьте качество в разделе «Разблокированные уровни качества», чтобы модули качества начали действовать.
