factory-solver-fp-import-warning-duplicate-recipe=Import Factory Planner: formuła „__1__” wystąpiła więcej niż raz; zachowano tylko pierwsze wystąpienie.
factory-solver-fp-import-warning-flattened-subfloors=Import Factory Planner: hierarchia podłóg spłaszczona do pojedynczej listy linii produkcyjnych.
factory-solver-fp-import-warning-percentage=Import Factory Planner: pominięto wartość procentową inną niż 100% w __1__ liniach; każda linia jest rozwiązywana zamiast tego w swoim naturalnym tempie.
factory-solver-fp-import-warning-inactive-line=Import Factory Planner: zaimportowano __1__ nieaktywnych linii jako aktywne; Factory solver nie ma przełącznika włączania poszczególnych linii.
factory-solver-fp-import-warning-priority-product=Import Factory Planner: pominięto wybór produktu priorytetowego w __1__ liniach; zamiast tego Factory solver pozwala LP zrównoważyć formuły wieloproduktowe.
factory-solver-fp-export-warning-recipe-lower-bound=Eksport Factory Planner: ograniczenia dolnej granicy formuły „__1__” nie da się wyrazić i zostało pominięte.
factory-solver-fp-export-warning-upper-bound-product=Eksport Factory Planner: górna / dokładna granica dla „__1__” wyeksportowana jako cel Factory Planner „produkuj co najmniej”; kierunek granicy został utracony.
factory-solver-fp-export-warning-constraint-temperature=Eksport Factory Planner: pominięto ograniczenie temperatury dla „__1__”; Factory Planner nie ma wymiaru temperatury płynu.
factory-solver-fp-export-warning-unsupported-constraint=Eksport Factory Planner: ograniczenie dla __1__ „__2__” nie ma odpowiednika w Factory Planner i zostało pominięte.
factory-solver-fp-export-warning-multiple-beacons=Eksport Factory Planner: linia formuły „__1__” ma wiele radionadajników; wyeksportowano tylko pierwszy.
factory-solver-fp-export-warning-virtual-recipe=Eksport Factory Planner: formuła wirtualna „__1__” nie ma odpowiednika w Factory Planner i została pominięta.
factory-solver-helmod-import-warning-flattened-blocks=Import Helmod: hierarchia bloków spłaszczona do pojedynczej listy linii produkcyjnych.
factory-solver-helmod-import-warning-duplicate-recipe=Import Helmod: formuła „__1__” wystąpiła więcej niż raz (zwykle dlatego, że ta sama formuła znajduje się w wielu blokach); zachowano tylko pierwsze wystąpienie.
factory-solver-helmod-import-warning-recipe-production=Import Helmod: formuła „__1__” miała mnożnik produkcji __2__ (nie 1); zresetowano do 1.
factory-solver-helmod-import-warning-unsupported-constraints=Import Helmod: pominięto ograniczenia specyficzne dla Helmod w __1__ formułach.
factory-solver-helmod-import-warning-module-priority=Import Helmod: pominięto priorytet modułów w __1__ formułach; zachowano tylko samą listę modułów.
factory-solver-helmod-import-warning-beacon-extras=Import Helmod: pominięto wartości radionadajnika per_factory / per_factory_constant w __1__ formułach; zachowano tylko liczbę zestawów.
factory-solver-helmod-import-warning-virtual-recipe-unmappable=Import Helmod: formuła wirtualna „__1__” nie ma odpowiednika w Factory solver i została pominięta.
factory-solver-helmod-import-warning-virtual-recipe-burnt=Import Helmod: formułę spalania „__1__” pominięto (Factory solver śledzi rezultaty spalania poprzez kanał paliwa bazowej formuły).
factory-solver-helmod-import-warning-virtual-recipe-technology=Import Helmod: formułę badawczą „__1__” pominięto (semantyka technologii i pakietów badań nie jest zgodna).
factory-solver-helmod-import-warning-virtual-recipe-customized=Import Helmod: dostosowaną przez użytkownika formułę „__1__” pominięto (Factory solver nie ma odpowiedniego mechanizmu edytowalnych formuł).
factory-solver-helmod-import-warning-energy-pseudo-item=Import Helmod: pominięto ograniczenie dla pseudoprzedmiotu energii Helmod „__1__” (LP w Factory solver nie ma kanału elektryczności).
factory-solver-helmod-export-warning-virtual-recipe=Eksport Helmod: formuła wirtualna „__1__” nie ma odpowiednika w Helmod i została pominięta.
factory-solver-helmod-export-warning-virtual-recipe-research=Eksport Helmod: badawczą formułę wirtualną „__1__” pominięto (formuły technologiczne Helmod produkują pseudoprzedmiot technologii, a nie przepływ pakietów).
factory-solver-helmod-export-warning-self-test-loadstring=Eksport Helmod: zserializowany model nie jest poprawnym kodem źródłowym Lua (błąd Factory solver). Zgłoś, jakie linie produkcyjne zostały wyeksportowane. Helmod nie zdoła wczytać tego ciągu z powodu wewnętrznego błędu Converter.lua.
factory-solver-helmod-export-warning-self-test-roundtrip=Eksport Helmod: zakodowany ciąg nie przetrwa cyklu kodowania/dekodowania (prawdopodobnie problem środowiska uruchomieniowego Factorio). Helmod nie zdoła wczytać tego ciągu z powodu wewnętrznego błędu Converter.lua.
factory-solver-helmod-export-warning-no-recipes-emitted=Eksport Helmod: __1__ linii produkcyjnych w rozwiązaniu, ale żadnej nie przekazano do modelu Helmod. Wszystkie linie pominięto z powodu nieobsługiwanych formuł wirtualnych lub braku przypisanej maszyny.
factory-solver-helmod-export-warning-partial-drop=Eksport Helmod: pominięto __1__ z __2__ linii produkcyjnych. Zobacz wcześniejsze ostrzeżenia dotyczące konkretnych formuł.
factory-solver-helmod-export-warning-no-machine=Eksport Helmod: pominięto linię produkcyjną dla „__1__”, ponieważ linia nie ma przypisanego machine_typed_name.
factory-solver-helmod-export-warning-recipe-equal-bound=Eksport Helmod: ograniczenie dokładnej granicy formuły „__1__” zapisano jako górną granicę (Helmod nie ma wymuszonego limitu).
factory-solver-helmod-export-warning-recipe-lower-bound=Eksport Helmod: ograniczenia dolnej granicy formuły „__1__” nie da się wyrazić i zostało pominięte.
factory-solver-helmod-export-warning-upper-bound-product=Eksport Helmod: ograniczenie górnej/dokładnej granicy dla „__1__” zapisano jako dolną granicę (wejścia produktów/składników Helmod mają tylko dolną granicę). Wartość liczbowa jest zachowana; dostrój w Helmod, jeśli pierwotny kierunek miał znaczenie.
factory-solver-helmod-export-warning-constraint-temperature=Eksport Helmod: pominięto temperaturę w ograniczeniu dla „__1__” (Helmod nie ma pola temperatury w produktach).
factory-solver-helmod-export-warning-multiple-solutions=Eksport Helmod: współdzielone ciągi przechowują tylko jeden model; wyeksportowano tylko pierwsze wybrane rozwiązanie.
factory-solver-helmod-export-warning-substrate=Eksport Helmod: pominięto kafelek podłoża w formule roślinnej „__1__” (Helmod nie ma pojęcia podłoża dla roślin).
factory-solver-helmod-export-warning-unsupported-constraint=Eksport Helmod: ograniczenie dla __1__ „__2__” nie ma odpowiednika w Helmod i zostało pominięte.

