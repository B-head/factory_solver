factory-solver-helmod-import-warning-virtual-recipe-burnt=Importação do Helmod: a receita de queima "__1__" foi descartada (o Factory solver rastreia resultados de queima pelo canal de combustível da receita base).
factory-solver-helmod-import-warning-virtual-recipe-technology=Importação do Helmod: a receita de pesquisa "__1__" foi descartada (a semântica de tecnologia e pacotes de pesquisa não se alinha).
factory-solver-helmod-import-warning-virtual-recipe-customized=Importação do Helmod: a receita personalizada pelo usuário "__1__" foi descartada (o Factory solver não possui mecanismo equivalente de receita editável).
