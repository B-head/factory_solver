factory-solver-helmod-import-warning-duplicate-recipe=Importação do Helmod: a receita "__1__" apareceu mais de uma vez (normalmente porque a mesma receita está em vários blocos); apenas a primeira ocorrência foi mantida.
factory-solver-helmod-import-warning-recipe-production=Importação do Helmod: a receita "__1__" tinha multiplicador de produção __2__ (diferente de 1); redefinido para 1.
factory-solver-helmod-import-warning-unsupported-constraints=Importação do Helmod: restrições específicas do Helmod descartadas em __1__ receita(s).
