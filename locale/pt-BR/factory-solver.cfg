factory-solver-helmod-export-warning-self-test-loadstring=Exportação do Helmod: o modelo serializado não é código Lua válido (bug do Factory solver). Por favor, relate quais linhas de produção você exportou. O Helmod não conseguirá carregar esta string e gerará um erro interno em Converter.lua.
factory-solver-helmod-export-warning-self-test-roundtrip=Exportação do Helmod: a string codificada não sobrevive a um ciclo de codificação/decodificação (provavelmente um problema de runtime do Factorio). O Helmod não conseguirá carregar esta string e gerará um erro interno em Converter.lua.
factory-solver-helmod-export-warning-no-recipes-emitted=Exportação do Helmod: __1__ linha(s) de produção na solução, mas nenhuma foi emitida para o modelo do Helmod. Todas as linhas foram descartadas devido a receitas virtuais não suportadas ou atribuição de máquina ausente.
factory-solver-helmod-export-warning-partial-drop=Exportação do Helmod: __1__ de __2__ linha(s) de produção foram descartadas. Veja os avisos anteriores para as receitas específicas.
factory-solver-helmod-export-warning-no-machine=Exportação do Helmod: linha de produção para "__1__" descartada porque a linha não possui machine_typed_name atribuído.
factory-solver-helmod-export-warning-recipe-equal-bound=Exportação do Helmod: a restrição de limite exato da receita "__1__" foi escrita como um limite superior (o Helmod não possui limite forçado).
factory-solver-helmod-export-warning-recipe-lower-bound=Exportação do Helmod: a restrição de limite inferior da receita "__1__" não pode ser expressa e foi descartada.
factory-solver-helmod-export-warning-upper-bound-product=Exportação do Helmod: a restrição de limite superior/exato em "__1__" foi escrita como um limite inferior (as entradas de produto/ingrediente do Helmod são apenas de limite inferior). O valor numérico é preservado; reajuste no Helmod se a direção original importava.
factory-solver-helmod-export-warning-constraint-temperature=Exportação do Helmod: temperatura na restrição para "__1__" descartada (o Helmod não possui campo de temperatura nos produtos).
factory-solver-helmod-export-warning-multiple-solutions=Exportação do Helmod: strings compartilhadas guardam apenas um modelo; apenas a primeira solução selecionada foi exportada.
factory-solver-helmod-export-warning-substrate=Exportação do Helmod: substrato de piso descartado na receita de planta "__1__" (o Helmod não possui o conceito de substrato de planta).
factory-solver-helmod-export-warning-unsupported-constraint=Exportação do Helmod: a restrição sobre __1__ "__2__" não tem equivalente no Helmod e foi descartada.

