factory-solver-fp-import-warning-duplicate-recipe=Factory Planner インポート: レシピ "__1__" が複数回登場しました。最初の1つだけが保持されました。
factory-solver-fp-import-warning-flattened-subfloors=Factory Planner インポート: サブフロアの階層が単一の生産ラインリストに平坦化されました。
factory-solver-fp-import-warning-percentage=Factory Planner インポート: __1__ 本のラインで100%以外のライン割合が破棄されました。各ラインは代わりに本来のレートで計算されます。
factory-solver-fp-import-warning-inactive-line=Factory Planner インポート: __1__ 本の非アクティブなラインをアクティブとしてインポートしました。Factory solver にはラインごとの有効/無効切り替えがありません。
factory-solver-fp-import-warning-priority-product=Factory Planner インポート: __1__ 本のラインで優先製品の選択が破棄されました。Factory solver では代わりに LP が複数製品レシピのバランスを取ります。
factory-solver-fp-export-warning-recipe-lower-bound=Factory Planner エクスポート: レシピ "__1__" の下限制約は表現できないため破棄されました。
factory-solver-fp-export-warning-upper-bound-product=Factory Planner エクスポート: "__1__" の上限/一致境界は Factory Planner の最低生産目標としてエクスポートされ、境界の方向が失われました。
factory-solver-fp-export-warning-constraint-temperature=Factory Planner エクスポート: "__1__" の温度制約を破棄しました。Factory Planner には流体の温度次元がありません。
factory-solver-fp-export-warning-unsupported-constraint=Factory Planner エクスポート: __1__ "__2__" に対する制約には Factory Planner の相当物がないため破棄されました。
factory-solver-fp-export-warning-multiple-beacons=Factory Planner エクスポート: レシピ "__1__" のラインには複数のビーコンがあります。最初の1つだけがエクスポートされました。
factory-solver-fp-export-warning-virtual-recipe=Factory Planner エクスポート: 仮想レシピ "__1__" には Factory Planner の相当物がないため破棄されました。
factory-solver-helmod-import-warning-flattened-blocks=Helmod インポート: ブロックの階層が単一の生産ラインリストに平坦化されました。
factory-solver-helmod-import-warning-duplicate-recipe=Helmod インポート: レシピ "__1__" が複数回登場しました（通常、同じレシピが複数のブロックに存在するためです）。最初の1つだけが保持されました。
factory-solver-helmod-import-warning-recipe-production=Helmod インポート: レシピ "__1__" の生産倍率が __2__（1ではない）でした。1にリセットしました。
factory-solver-helmod-import-warning-unsupported-constraints=Helmod インポート: __1__ 個のレシピで Helmod 固有の制約を破棄しました。
factory-solver-helmod-import-warning-module-priority=Helmod インポート: __1__ 個のレシピでモジュール優先度を破棄しました。モジュールのリスト自体のみ保持されました。
factory-solver-helmod-import-warning-beacon-extras=Helmod インポート: __1__ 個のレシピでビーコンの per_factory / per_factory_constant を破棄しました。コンボ数のみ保持されました。
factory-solver-helmod-import-warning-virtual-recipe-unmappable=Helmod インポート: 仮想レシピ "__1__" には Factory solver の相当物がないため破棄されました。
factory-solver-helmod-import-warning-virtual-recipe-burnt=Helmod インポート: 燃焼レシピ "__1__" を破棄しました（Factory solver は燃焼結果を基本レシピの燃料チャンネルで管理します）。
factory-solver-helmod-import-warning-virtual-recipe-technology=Helmod インポート: 研究レシピ "__1__" を破棄しました（テクノロジーと研究パックの意味論が一致しません）。
factory-solver-helmod-import-warning-virtual-recipe-customized=Helmod インポート: ユーザーがカスタマイズしたレシピ "__1__" を破棄しました（Factory solver には相当する編集可能レシピの仕組みがありません）。
factory-solver-helmod-import-warning-energy-pseudo-item=Helmod インポート: Helmod のエネルギー擬似アイテム "__1__" に対する制約を破棄しました（Factory solver の LP には電力チャンネルがありません）。
factory-solver-helmod-export-warning-virtual-recipe=Helmod エクスポート: 仮想レシピ "__1__" には Helmod の相当物がないため破棄されました。
factory-solver-helmod-export-warning-virtual-recipe-research=Helmod エクスポート: 研究仮想レシピ "__1__" を破棄しました（Helmod のテクノロジーレシピはパックの流れではなくテクノロジー擬似アイテムを生産します）。
factory-solver-helmod-export-warning-self-test-loadstring=Helmod エクスポート: 直列化されたモデルが有効な Lua ソースではありません（Factory solver のバグ）。どの生産ラインをエクスポートしたか報告してください。Helmod はこの文字列を内部の Converter.lua エラーで読み込めません。
factory-solver-helmod-export-warning-self-test-roundtrip=Helmod エクスポート: エンコードした文字列がエンコード/デコードの往復に耐えられません（おそらく Factorio ランタイムの問題）。Helmod はこの文字列を内部の Converter.lua エラーで読み込めません。
factory-solver-helmod-export-warning-no-recipes-emitted=Helmod エクスポート: ソリューションに __1__ 本の生産ラインがありますが、Helmod モデルには1本も出力されませんでした。対応していない仮想レシピ、または機械の割り当て欠如により、すべてのラインが破棄されました。
factory-solver-helmod-export-warning-partial-drop=Helmod エクスポート: __2__ 本中 __1__ 本の生産ラインが破棄されました。具体的なレシピは前の警告を参照してください。
factory-solver-helmod-export-warning-no-machine=Helmod エクスポート: machine_typed_name が割り当てられていないため、"__1__" の生産ラインを破棄しました。
factory-solver-helmod-export-warning-recipe-equal-bound=Helmod エクスポート: レシピ "__1__" の一致境界制約は上限として書き出されました（Helmod には強制制限がありません）。
factory-solver-helmod-export-warning-recipe-lower-bound=Helmod エクスポート: レシピ "__1__" の下限制約は表現できないため破棄されました。
factory-solver-helmod-export-warning-upper-bound-product=Helmod エクスポート: "__1__" の上限/一致境界制約は下限として書き出されました（Helmod の製品/素材の入力は下限のみです）。数値は保持されます。元の方向が重要だった場合は Helmod で再調整してください。
factory-solver-helmod-export-warning-constraint-temperature=Helmod エクスポート: "__1__" に対する制約の温度を破棄しました（Helmod の製品には温度フィールドがありません）。
factory-solver-helmod-export-warning-multiple-solutions=Helmod エクスポート: 共有文字列はモデルを1つしか保持できません。最初に選択したソリューションのみがエクスポートされました。
factory-solver-helmod-export-warning-substrate=Helmod エクスポート: 植物レシピ "__1__" の土壌タイルを破棄しました（Helmod には植物の土壌の概念がありません）。
factory-solver-helmod-export-warning-unsupported-constraint=Helmod エクスポート: __1__ "__2__" に対する制約には Helmod の相当物がないため破棄されました。

