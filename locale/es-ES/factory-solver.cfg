factory-solver-helmod-export-warning-self-test-loadstring=Exportación de Helmod: el modelo serializado no es código Lua válido (error de Factory solver). Informa de qué líneas de producción exportaste. Helmod no podrá cargar esta cadena y dará un error interno de Converter.lua.
