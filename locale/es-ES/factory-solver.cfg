factory-solver-helmod-export-warning-no-recipes-emitted=Exportación de Helmod: hay __1__ línea(s) de producción en la solución pero ninguna se emitió al modelo de Helmod. Todas las líneas se descartaron por recetas virtuales no compatibles o por falta de asignación de máquina.
