factory-solver-helmod-export-warning-recipe-equal-bound=Exportación de Helmod: la restricción de límite exacto de la receta "__1__" se escribió como límite superior (Helmod no tiene límite forzado).
factory-solver-helmod-export-warning-recipe-lower-bound=Exportación de Helmod: la restricción de límite inferior de la receta "__1__" no se puede expresar y se descartó.
factory-solver-helmod-export-warning-upper-bound-product=Exportación de Helmod: la restricción de límite superior o exacto sobre "__1__" se escribió como límite inferior (las entradas de producto/ingrediente de Helmod solo admiten límite inferior). El valor numérico se conserva; reajústalo en Helmod si la dirección original importaba.
factory-solver-helmod-export-warning-constraint-temperature=Exportación de Helmod: se descartó la temperatura en la restricción de "__1__" (Helmod no tiene campo de temperatura en los productos).
factory-solver-helmod-export-warning-multiple-solutions=Exportación de Helmod: las cadenas compartidas contienen un solo modelo; solo se exportó la primera solución seleccionada.
factory-solver-helmod-export-warning-substrate=Exportación de Helmod: se descartó el sustrato de la receta de planta "__1__" (Helmod no tiene el concepto de sustrato de planta).
