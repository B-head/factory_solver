factory-solver-fp-import-warning-duplicate-recipe=Factory Planner 导入：配方“__1__”出现了多次；仅保留首次出现的一项。
factory-solver-fp-import-warning-flattened-subfloors=Factory Planner 导入：子层级结构已扁平化为单一生产线列表。
factory-solver-fp-import-warning-percentage=Factory Planner 导入：在 __1__ 条生产线上丢弃了非 100% 的生产线百分比；每条生产线改为按其自然速率求解。
factory-solver-fp-import-warning-inactive-line=Factory Planner 导入：将 __1__ 条未激活的生产线作为激活状态导入；Factory solver 没有单条生产线的启用开关。
factory-solver-fp-import-warning-priority-product=Factory Planner 导入：在 __1__ 条生产线上丢弃了优先产品的选择；Factory solver 改为让 LP 平衡多产品配方。
factory-solver-fp-export-warning-recipe-lower-bound=Factory Planner 导出：配方“__1__”的下限约束无法表达，已被丢弃。
factory-solver-fp-export-warning-upper-bound-product=Factory Planner 导出：“__1__”上的上限/精确约束已导出为 Factory Planner 的至少生产目标；约束方向已丢失。
factory-solver-fp-export-warning-constraint-temperature=Factory Planner 导出：丢弃了“__1__”上的温度约束；Factory Planner 没有流体温度维度。
factory-solver-fp-export-warning-unsupported-constraint=Factory Planner 导出：__1__“__2__”上的约束在 Factory Planner 中没有对应项，已被丢弃。
factory-solver-fp-export-warning-multiple-beacons=Factory Planner 导出：配方“__1__”的生产线有多个插件效果分享塔；仅导出了第一个。
factory-solver-fp-export-warning-virtual-recipe=Factory Planner 导出：虚拟配方“__1__”在 Factory Planner 中没有对应项，已被丢弃。
factory-solver-helmod-import-warning-flattened-blocks=Helmod 导入：区块层级结构已扁平化为单一生产线列表。
factory-solver-helmod-import-warning-duplicate-recipe=Helmod 导入：配方“__1__”出现了多次（通常是因为同一配方存在于多个区块中）；仅保留首次出现的一项。
factory-solver-helmod-import-warning-recipe-production=Helmod 导入：配方“__1__”的生产倍率为 __2__（不为 1）；已重置为 1。
factory-solver-helmod-import-warning-unsupported-constraints=Helmod 导入：在 __1__ 个配方上丢弃了 Helmod 专有的约束。
factory-solver-helmod-import-warning-module-priority=Helmod 导入：在 __1__ 个配方上丢弃了插件优先级；仅保留了插件列表本身。
factory-solver-helmod-import-warning-beacon-extras=Helmod 导入：在 __1__ 个配方上丢弃了插件效果分享塔的 per_factory / per_factory_constant；仅保留了组合数量。
factory-solver-helmod-import-warning-virtual-recipe-unmappable=Helmod 导入：虚拟配方“__1__”在 Factory solver 中没有对应项，已被丢弃。
factory-solver-helmod-import-warning-virtual-recipe-burnt=Helmod 导入：燃烧配方“__1__”已被丢弃（Factory solver 通过基础配方的燃料通道来追踪燃烧产物）。
factory-solver-helmod-import-warning-virtual-recipe-technology=Helmod 导入：研究配方“__1__”已被丢弃（科技与研究包的语义不一致）。
factory-solver-helmod-import-warning-virtual-recipe-customized=Helmod 导入：用户自定义的配方“__1__”已被丢弃（Factory solver 没有等效的可编辑配方机制）。
factory-solver-helmod-import-warning-energy-pseudo-item=Helmod 导入：丢弃了对 Helmod 能量伪物品“__1__”的约束（Factory solver 的 LP 没有电力通道）。
factory-solver-helmod-export-warning-virtual-recipe=Helmod 导出：虚拟配方“__1__”在 Helmod 中没有对应项，已被丢弃。
factory-solver-helmod-export-warning-virtual-recipe-research=Helmod 导出：研究虚拟配方“__1__”已被丢弃（Helmod 的科技配方产出的是科技伪物品，而非研究包流动）。
factory-solver-helmod-export-warning-self-test-loadstring=Helmod 导出：序列化后的模型不是有效的 Lua 源代码（Factory solver 的缺陷）。请报告你导出的是哪些生产线。Helmod 在加载此字符串时会出现 Converter.lua 内部错误而失败。
factory-solver-helmod-export-warning-self-test-roundtrip=Helmod 导出：编码后的字符串无法通过编码/解码往返测试（可能是 Factorio 运行时问题）。Helmod 在加载此字符串时会出现 Converter.lua 内部错误而失败。
factory-solver-helmod-export-warning-no-recipes-emitted=Helmod 导出：方案中有 __1__ 条生产线，但没有任何一条被写入 Helmod 模型。所有生产线均因不受支持的虚拟配方或缺少机器分配而被丢弃。
factory-solver-helmod-export-warning-partial-drop=Helmod 导出：__2__ 条生产线中有 __1__ 条被丢弃。具体配方请参见前面的警告。
factory-solver-helmod-export-warning-no-machine=Helmod 导出：丢弃了“__1__”的生产线，因为该生产线未分配 machine_typed_name。
factory-solver-helmod-export-warning-recipe-equal-bound=Helmod 导出：配方“__1__”的精确约束被写为上限（Helmod 没有强制限制）。
factory-solver-helmod-export-warning-recipe-lower-bound=Helmod 导出：配方“__1__”的下限约束无法表达，已被丢弃。
factory-solver-helmod-export-warning-upper-bound-product=Helmod 导出：“__1__”上的上限/精确约束被写为下限（Helmod 的产品/原料输入仅支持下限）。数值已保留；如果原始方向很重要，请在 Helmod 中重新调整。
factory-solver-helmod-export-warning-constraint-temperature=Helmod 导出：丢弃了“__1__”约束上的温度（Helmod 的产品没有温度字段）。
factory-solver-helmod-export-warning-multiple-solutions=Helmod 导出：共享字符串仅能容纳一个模型；仅导出了第一个选中的方案。
factory-solver-helmod-export-warning-substrate=Helmod 导出：丢弃了植物配方“__1__”上的基质地块（Helmod 没有植物基质的概念）。
factory-solver-helmod-export-warning-unsupported-constraint=Helmod 导出：__1__“__2__”上的约束在 Helmod 中没有对应项，已被丢弃。

