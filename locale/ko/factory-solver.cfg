factory-solver-fp-import-warning-duplicate-recipe=Factory Planner 가져오기: 제작법 "__1__"이(가) 두 번 이상 나타났습니다. 첫 번째 항목만 유지되었습니다.
factory-solver-fp-import-warning-flattened-subfloors=Factory Planner 가져오기: 하위 층 계층이 단일 생산 라인 목록으로 평탄화되었습니다.
factory-solver-fp-import-warning-percentage=Factory Planner 가져오기: __1__개 라인에서 100%가 아닌 라인 비율을 제거했습니다. 각 라인은 대신 자연 속도로 계산됩니다.
factory-solver-fp-import-warning-inactive-line=Factory Planner 가져오기: __1__개의 비활성 라인을 활성으로 가져왔습니다. Factory solver에는 라인별 활성화 토글이 없습니다.
factory-solver-fp-import-warning-priority-product=Factory Planner 가져오기: __1__개 라인에서 우선 생산품 선택을 제거했습니다. Factory solver는 대신 LP가 다중 생산품 제작법의 균형을 맞추도록 합니다.
factory-solver-fp-export-warning-recipe-lower-bound=Factory Planner 내보내기: 제작법 "__1__"의 하한 제약 조건은 표현할 수 없어 제거되었습니다.
factory-solver-fp-export-warning-upper-bound-product=Factory Planner 내보내기: "__1__"의 상한/정확 경계가 Factory Planner의 최소 생산 목표로 내보내졌습니다. 경계 방향은 손실되었습니다.
factory-solver-fp-export-warning-constraint-temperature=Factory Planner 내보내기: "__1__"의 온도 제약 조건을 제거했습니다. Factory Planner에는 유체 온도 차원이 없습니다.
factory-solver-fp-export-warning-unsupported-constraint=Factory Planner 내보내기: __1__ "__2__"의 제약 조건은 Factory Planner에 해당 항목이 없어 제거되었습니다.
factory-solver-fp-export-warning-multiple-beacons=Factory Planner 내보내기: 제작법 "__1__"의 라인에 여러 신호기가 있습니다. 첫 번째 것만 내보내졌습니다.
factory-solver-fp-export-warning-virtual-recipe=Factory Planner 내보내기: 가상 제작법 "__1__"은(는) Factory Planner에 해당 항목이 없어 제거되었습니다.
factory-solver-helmod-import-warning-flattened-blocks=Helmod 가져오기: 블록 계층이 단일 생산 라인 목록으로 평탄화되었습니다.
factory-solver-helmod-import-warning-duplicate-recipe=Helmod 가져오기: 제작법 "__1__"이(가) 두 번 이상 나타났습니다 (보통 같은 제작법이 여러 블록에 존재하기 때문). 첫 번째 항목만 유지되었습니다.
factory-solver-helmod-import-warning-recipe-production=Helmod 가져오기: 제작법 "__1__"의 생산 배수가 __2__(1이 아님)이었습니다. 1로 초기화되었습니다.
factory-solver-helmod-import-warning-unsupported-constraints=Helmod 가져오기: __1__개 제작법에서 Helmod 전용 제약 조건을 제거했습니다.
factory-solver-helmod-import-warning-module-priority=Helmod 가져오기: __1__개 제작법에서 모듈 우선순위를 제거했습니다. 모듈 목록 자체만 유지되었습니다.
factory-solver-helmod-import-warning-beacon-extras=Helmod 가져오기: __1__개 제작법에서 신호기 per_factory / per_factory_constant를 제거했습니다. 조합 개수만 유지되었습니다.
factory-solver-helmod-import-warning-virtual-recipe-unmappable=Helmod 가져오기: 가상 제작법 "__1__"은(는) Factory solver에 대응 항목이 없어 제거되었습니다.
factory-solver-helmod-import-warning-virtual-recipe-burnt=Helmod 가져오기: 연소 제작법 "__1__"이(가) 제거되었습니다 (Factory solver는 연소 결과물을 기본 제작법의 연료 채널을 통해 추적합니다).
factory-solver-helmod-import-warning-virtual-recipe-technology=Helmod 가져오기: 연구 제작법 "__1__"이(가) 제거되었습니다 (기술 및 연구 팩 의미 체계가 일치하지 않습니다).
factory-solver-helmod-import-warning-virtual-recipe-customized=Helmod 가져오기: 사용자 정의 제작법 "__1__"이(가) 제거되었습니다 (Factory solver에는 편집 가능한 제작법에 해당하는 메커니즘이 없습니다).
factory-solver-helmod-import-warning-energy-pseudo-item=Helmod 가져오기: Helmod 에너지 의사 아이템 "__1__"의 제약 조건을 제거했습니다 (Factory solver의 LP에는 전기 채널이 없습니다).
factory-solver-helmod-export-warning-virtual-recipe=Helmod 내보내기: 가상 제작법 "__1__"은(는) Helmod에 해당 항목이 없어 제거되었습니다.
factory-solver-helmod-export-warning-virtual-recipe-research=Helmod 내보내기: 연구 가상 제작법 "__1__"이(가) 제거되었습니다 (Helmod의 기술 제작법은 팩 흐름이 아닌 기술 의사 아이템을 생산합니다).
factory-solver-helmod-export-warning-self-test-loadstring=Helmod 내보내기: 직렬화된 모델이 유효한 Lua 소스가 아닙니다 (Factory solver 버그). 내보낸 생산 라인을 신고해 주세요. Helmod는 내부 Converter.lua 오류로 이 문자열을 불러오지 못합니다.
factory-solver-helmod-export-warning-self-test-roundtrip=Helmod 내보내기: 인코딩된 문자열이 인코딩/디코딩 왕복을 견디지 못합니다 (Factorio 런타임 문제일 가능성이 높습니다). Helmod는 내부 Converter.lua 오류로 이 문자열을 불러오지 못합니다.
factory-solver-helmod-export-warning-no-recipes-emitted=Helmod 내보내기: 솔루션에 __1__개의 생산 라인이 있지만 Helmod 모델로 내보내진 것이 없습니다. 지원되지 않는 가상 제작법이나 기계 미할당으로 인해 모든 라인이 제거되었습니다.
factory-solver-helmod-export-warning-partial-drop=Helmod 내보내기: __2__개 중 __1__개의 생산 라인이 제거되었습니다. 구체적인 제작법은 앞의 경고를 참조하세요.
factory-solver-helmod-export-warning-no-machine="__1__"의 생산 라인에 machine_typed_name이 할당되지 않아 Helmod 내보내기에서 제거되었습니다.
factory-solver-helmod-export-warning-recipe-equal-bound=Helmod 내보내기: 제작법 "__1__"의 정확 경계 제약 조건이 상한으로 작성되었습니다 (Helmod에는 강제 제한이 없습니다).
factory-solver-helmod-export-warning-recipe-lower-bound=Helmod 내보내기: 제작법 "__1__"의 하한 제약 조건은 표현할 수 없어 제거되었습니다.
factory-solver-helmod-export-warning-upper-bound-product=Helmod 내보내기: "__1__"의 상한/정확 경계 제약 조건이 하한으로 작성되었습니다 (Helmod의 생산품/재료 입력은 하한만 가능합니다). 수치 값은 유지됩니다. 원래 방향이 중요했다면 Helmod에서 다시 조정하세요.
factory-solver-helmod-export-warning-constraint-temperature=Helmod 내보내기: "__1__"의 제약 조건에서 온도를 제거했습니다 (Helmod에는 생산품에 온도 필드가 없습니다).
factory-solver-helmod-export-warning-multiple-solutions=Helmod 내보내기: 공유 문자열은 하나의 모델만 담을 수 있습니다. 선택된 첫 번째 솔루션만 내보내졌습니다.
factory-solver-helmod-export-warning-substrate=Helmod 내보내기: 식물 제작법 "__1__"의 토양 타일을 제거했습니다 (Helmod에는 식물 토양 개념이 없습니다).
factory-solver-helmod-export-warning-unsupported-constraint=Helmod 내보내기: __1__ "__2__"의 제약 조건은 Helmod에 해당 항목이 없어 제거되었습니다.

